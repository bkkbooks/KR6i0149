body:
  text: 宋居士沮渠京聲譯聞如是一時佛在羅閲祇竹園中與千二百五十比丘俱時有國王號名摩達王時當出軍征討選國中人民數百萬人皆應赴從時有比丘已得羅漢道到其國分衛並見録將詣王宮門王有馬監令比丘養視官馬勤苦七日王後身自臨視軍陳比丘見王即於其前輕舉飛翔上住空中現其威神王便恐怖叩頭悔過我實愚癡不別真僞推問國內誰令神人為是者今當有所治殺比丘告王言非王及國人過也自我宿命行道常供養師我時為師設飯師謂我言且先澡手已乃當飯我愚癡心念言師亦不養官馬何故不預澡手師即謂我言汝今念此輕耳後重如何我聞是語便愁憂師知其意便念言我會當泥洹何故令人惱耶即以其夜三更時般泥洹從來久遠各更生死今用是故受其宿殃養馬七日夫善惡行輒有殃福如影隨形王聞比丘說罪福意解歡喜乞得歸命於神人比丘告言卿當自歸於佛佛為三界師王及國人民皆隨比丘到佛所稽首為佛作禮受五戒作優婆塞佛便為王及人民現相好威神光曜天地復為說無常苦空王於是便得須陀洹道國中人民皆受五戒十善歸命三尊月日齊戒以為常法阿難整衣服作禮白佛言是王及國中人民見佛聞經即解何以故佛言及昔摩父佛時是比丘作沙門王時為優婆塞淨意供養三日令我所在處常得其福今已得度世之道今來會此聞經便得須陀洹道四輩弟子天龍鬼神聞經歡喜前為佛作禮而去
